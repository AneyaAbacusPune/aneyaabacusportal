<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aneya Abacus | Student Portal</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7f6; color: #333; text-align: center; padding: 20px; }
        .card { background: white; max-width: 400px; margin: 20px auto; padding: 30px; border-radius: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        h1 { color: #f36621; }
        input { width: 90%; padding: 12px; margin: 10px 0; border: 2px solid #ddd; border-radius: 8px; font-size: 18px; text-align: center; }
        button { background: #f36621; color: white; border: none; padding: 15px 30px; font-size: 18px; font-weight: bold; border-radius: 8px; cursor: pointer; width: 100%; transition: 0.2s; }
        button:hover { background: #d35400; }
        
        /* The Vertical Math Display */
        .math-problem { font-size: 32px; font-weight: bold; letter-spacing: 2px; line-height: 1.5; margin: 20px 0; display: inline-block; text-align: right; }
        .math-line { border-bottom: 4px solid #333; margin-bottom: 10px; width: 100%; }
        
        .hidden { display: none; }
        .streak-badge { background: #ffd700; color: #000; padding: 5px 10px; border-radius: 20px; font-weight: bold; font-size: 14px; }
    </style>
</head>
<body>

    <div id="loginScreen" class="card">
        <h1>Aneya Abacus</h1>
        <p>Enter your mobile number to start</p>
        <input type="number" id="mobileInput" placeholder="e.g. 9876500001">
        <button id="loginBtn">LOGIN</button>
        <p id="loginError" style="color: red; font-weight: bold;"></p>
    </div>

    <div id="dashboardScreen" class="card hidden">
        <h2 id="welcomeText">Welcome!</h2>
        <p>Level: <span id="levelText" style="font-weight:bold;"></span> | <span class="streak-badge">🔥 Streak: <span id="streakText"></span></span></p>
        <button id="startExamBtn">START TODAY'S EXAM</button>
    </div>

    <div id="examScreen" class="card hidden">
        <h3 style="color: #666;">Question <span id="qNumText">1</span></h3>
        
        <div class="math-problem">
            <div id="verticalSums">
                </div>
            <div class="math-line"></div>
        </div>

        <input type="number" id="answerInput" placeholder="Your Answer">
        <button id="submitAnswerBtn">SUBMIT ANSWER</button>
        <p id="feedbackText" style="font-weight: bold; margin-top: 15px;"></p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

        // ⚠️ PASTE YOUR API KEYS HERE:
        const firebaseConfig = {
            apiKey: "AIzaSyAmTKOKWidNXBEM2yBpWuifyl_HE8CvZdQ",
            authDomain: "aneyaabacusportal.firebaseapp.com",
            projectId: "aneyaabacusportal",
            storageBucket: "aneyaabacusportal.firebasestorage.app",
            messagingSenderId: "293262631227",
            appId: "1:293262631227:web:e23696a598ddf6e085d71e",
            measurementId: "G-XC316B2MYS"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Global State Variables
        let currentStudent = null;
        let currentQuestionNumber = 1; 
        let currentCorrectAnswer = null;

        // UI Elements
        const screens = {
            login: document.getElementById('loginScreen'),
            dashboard: document.getElementById('dashboardScreen'),
            exam: document.getElementById('examScreen')
        };

        function showScreen(screenName) {
            Object.values(screens).forEach(s => s.classList.add('hidden'));
            screens[screenName].classList.remove('hidden');
        }

        // --- 1. LOGIN SYSTEM ---
        document.getElementById('loginBtn').addEventListener('click', async () => {
            const mobile = document.getElementById('mobileInput').value.trim();
            const errorTxt = document.getElementById('loginError');
            
            if(mobile.length < 10) { errorTxt.innerText = "Enter a valid 10-digit number."; return; }
            
            try {
                // Fetch student straight from Mumbai database
                const studentDoc = await getDoc(doc(db, "Students", mobile));
                
                if (studentDoc.exists()) {
                    currentStudent = studentDoc.data();
                    
                    // Populate Dashboard
                    document.getElementById('welcomeText').innerText = `Welcome back, ${currentStudent.name}!`;
                    document.getElementById('levelText').innerText = currentStudent.level;
                    document.getElementById('streakText').innerText = currentStudent.currentStreak;
                    
                    showScreen('dashboard');
                } else {
                    errorTxt.innerText = "Student not found. Check number.";
                }
            } catch(e) {
                errorTxt.innerText = "Network Error. Try again.";
                console.error(e);
            }
        });

        // --- 2. LOAD EXAM ---
        document.getElementById('startExamBtn').addEventListener('click', () => {
            loadQuestion(currentQuestionNumber);
            showScreen('exam');
        });

        async function loadQuestion(qNum) {
            try {
                const level = currentStudent.level;
                // Grabs the exact question from the student's level folder
                const qDoc = await getDoc(doc(db, `Questions/Level_${level}/all_questions`, qNum.toString()));
                
                if (qDoc.exists()) {
                    const qData = qDoc.data();
                    currentCorrectAnswer = qData.correctAnswer;
                    document.getElementById('qNumText').innerText = qNum;

                    // THE VERTICAL MATH DISPLAY LOGIC
                    // Takes "12, 23, 45", splits it, and stacks it inside divs
                    const rawString = qData.sumString; 
                    const numbersArray = rawString.split(','); 
                    
                    let htmlStack = "";
                    numbersArray.forEach(num => {
                        htmlStack += `<div>${num.trim()}</div>`;
                    });
                    
                    document.getElementById('verticalSums').innerHTML = htmlStack;
                    document.getElementById('answerInput').value = ""; // Clear old answer
                    document.getElementById('feedbackText').innerText = "";
                } else {
                    document.getElementById('verticalSums').innerHTML = "<div>End of Test!</div>";
                    document.getElementById('submitAnswerBtn').style.display = "none";
                }
            } catch(e) {
                console.error("Error loading question:", e);
            }
        }

        // --- 3. SUBMIT ANSWER ---
        document.getElementById('submitAnswerBtn').addEventListener('click', () => {
            const userAnswer = parseInt(document.getElementById('answerInput').value);
            const feedback = document.getElementById('feedbackText');

            if(userAnswer === currentCorrectAnswer) {
                feedback.innerText = "✅ CORRECT!";
                feedback.style.color = "green";
                
                // Wait 1 second, then load the next question automatically
                setTimeout(() => {
                    currentQuestionNumber++;
                    loadQuestion(currentQuestionNumber);
                }, 1000);
            } else {
                feedback.innerText = "❌ Incorrect, try again!";
                feedback.style.color = "red";
            }
        });
    </script>
</body>
</html>
